<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wiggle Wiggle Redesign - Song Ayun</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <a href="../index.html" class="back-link">← Back to Portfolio</a>
    </header>

    <main class="content">
        <!-- 메인 프로젝트 디자인 이미지 (첨부해주신 이미지) -->
        <section class="image-section">
            <img src="wiggle_wiggle_detail.png" alt="Wiggle Wiggle Design Process" class="full-image">
        </section>

        <!-- 비디오 섹션 -->
        <section class="video-section">
            <div class="video-container">
                <h2 class="section-label">Project Video</h2>
                <div class="video-wrapper">
                    <!-- 영상 파일을 첨부해주시면 아래 src를 파일명으로 바꿔주세요 -->
                    <video controls poster="video_poster.png" class="project-video">
                        <source src="wiggle_wiggle_video.mp4" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>© 2026 Song Ayun. All rights reserved.</p>
    </footer>
</body>
</html>
